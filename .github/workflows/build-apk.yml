name: Build APK

on:
  push:
    branches: [ "main", "apk-android" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip3 install --user buildozer cython

      - name: Setup Android SDK and Buildozer
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          export PATH=$PATH:~/.local/bin/
          # Forzamos la inicialización de la estructura de buildozer sin borrar nada
          buildozer --version

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: virus-apk
          path: bin/*.apk
